name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - 'apps/admin_dashboard/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
      
      - name: Build APK
        run: |
          cd apps/admin_dashboard
          flutter pub get
          flutter build apk --release
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: admin-dashboard-apk
          path: apps/admin_dashboard/build/app/outputs/flutter-apk/app-release.apk